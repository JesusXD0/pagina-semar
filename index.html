<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        .img-esquina {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            z-index: 999;
        }
    </style>
</head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* FONDO ANIMADO */
body::after {
    content: "";
    position: fixed;
    width: 200%;
    height:100%;
    background: linear-gradient(90deg, transparent, rgb(255, 30, 30), transparent);
    animation: brillo1 10s linear infinite;
    z-index: -1;
}

body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(95, 95, 95, 0.925), transparent);
    animation: brillo2 10s linear infinite;
    z-index: -1;
}

@keyframes brillo1 {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

@keyframes brillo2 {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

@keyframes brilloMulti {
    0% {
        transform: translate(-100%, -100%) rotate(0deg);
    }
    50% {
        transform: translate(0%, 0%) rotate(10deg);
    }
    100% {
        transform: translate(100%, 100%) rotate(0deg);
    }
}

@keyframes brilloMulti {
    0% {
        transform: translate(-100%, -100%) rotate(0deg);
    }
    50% {
        transform: translate(0%, 0%) rotate(10deg);
    }
    100% {
        transform: translate(100%, 100%) rotate(0deg);
    }
}

@keyframes brillo1 {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

@keyframes brillo2 {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}
@keyframes moverParticulas {
    0% { transform: translateY(0); }
    100% { transform: translateY(-100px); }
}

@keyframes mover {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(0,0); }
}


/* CONTENEDOR */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}
.subtitulo {
    transform: translateY(-10px); /* 👈 súbelo poquito */
    color: rgba(0, 0, 0, 0.774); /* rojo */
}
/* TITULO */
.main-title {
    position: relative;
    top: -30px; /* 👈 súbelo */


    
    font-size: 35px;
    background: linear-gradient(90deg, rgb(168, 26, 97), rgba(0, 0, 0, 0.774));
    -webkit-background-clip: text;
    
    -webkit-text-fill-color: transparent;
}


/* CAJA */
.box {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 900px;
    display: flex;
    justify-content: space-between;
    color: black;
    animation: fade 0.5s;
}

/* ANIMACION CAMBIO */
@keyframes mover {
    0% { transform: translate(0,0); }
    50% { transform: translate(-5%, -5%); }
    100% { transform: translate(0,0); }
}

/* INFO */
.info {
    width: 60%;
}

.texto {
    border: 2px solid rgb(255, 255, 255);
    padding: 15px;
    height: 120px;
    overflow-y: auto;
    margin-bottom: 20px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid rgba(252, 13, 113, 0.212);
    padding: 5px;
    text-align: center;
}

/* BOTON */
.btn {
    width: 60px;
    height: 40px;
    border-radius: 30px;
    background: white;
    border: 2px solid rgb(0, 0, 0);
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
}

/* GRAFICA */
canvas {
    width: 250px !important;
    height: 250px !important;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="container">

    <div class="main-title">SEMAR | Resultados de Encuesta</div>


<div class="subtitulo">Muchas gracías a todos los que participaron, se iran aplicando gran parte de las votaciones ganadas y sus recompensas se iran dando en los proximos días. </div>


    <div class="box" id="box">

        <div class="info">
            <div class="texto" id="texto"></div>
            
            <table id="tabla"></table>
        </div>

        <div>
            <canvas id="grafica"></canvas>
        </div>

        <div class="btn" onclick="siguiente()">➡</div>

    </div>

</div>

<script>
/* CURSOR */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
});

/* tabla */
const slides = [
{
    texto: "1. Opiniones del Servidor. // Estamos de acuerdo con que falta mejora, por eso mismo se esta trabajando en el servidor desde su apertura, siendo como prioridades la creacion y ajustacion de los roles, colores y emblemas. ",
    datos: [2, 6,10,1,1],
    labels: ["Muy Bueno", "Bueno", "Regular, falta mejora","Malo","Muy Malo"],
    colores: ["Azul","Rojo","Naranja","Verde","Morado"]
},
{
    texto: "2. Bot de Jornada o Trident // Se seguira usando el actual ya que gano por mas del 50% de la votación, sin embargo tomaremos en cuenta la respuesta personal de tener un Bot mas como repuesto / respaldo.",
    datos: [15,4,3,1,],
    labels: ["El Bot esta bien, me gusta.", "Esta bien, pero podria ver uno mejor", "Me gustaria que usaramos Trident","Opino que haya otro bot de respaldo."],
    colores: ["Azul","Rojo","Naranja","Verde","Morado"]
},
{
    texto: "3. Opiniones de los Roles actuales del servidor. // Somos concientes que hace falta mejorar, estos ultimos días se es algo que se ha ido modificando y buscando tenerlos de la manera mas ordenada y correcta posibe. ",
    datos: [7, 11, 2,1,],
    labels: ["Estan bien organizados, me gusta.", "No estan mal, pero puede mejorar.", "Le hace falta demasiado trabajo, no me gusta.","Porqueria.",],
    colores: ["Azul","Rojo","Naranja","Verde","Morado"]
    
},
{
    texto: "Gracias por participar en la encuesta. Pronto se aplicarán todos los cambios.",
    soloTexto: true
}

];

let index = 0;
let chart;

/* CARGAR SLIDE */
function cargarSlide(i) {

    document.getElementById("texto").innerText = slides[i].texto;
    

    /* TABLA */
    let tablaHTML = "<tr><th>Dato</th><th>Valor</th><th>Color</th></tr>";
    slides[i].labels.forEach((label, idx) => {
    tablaHTML += `<tr><td>${label}</td><td>${slides[i].datos[idx]}</td><td>${slides[i].colores ? slides[i].colores[idx] : ""}</td></tr>`;
    });
    document.getElementById("tabla").innerHTML = tablaHTML;

    /* GRAFICA */
    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("grafica"), {
        type: "doughnut",
        data: {
            labels: slides[i].labels,
            datasets: [{
                data: slides[i].datos,
                backgroundColor: ["blue", "red", "orange","green","purple","pink"]
            }]
        },
        options: {
            plugins: { legend: { display: false } }
        }
    });

    /* ANIMACION */
    const box = document.getElementById("box");
    box.style.animation = "none";
    setTimeout(() => box.style.animation = "fade 0.5s", 10);
}

/* BOTON */
function siguiente() {
    index++;
    if (index >= slides.length) index = 0;
    cargarSlide(index);
}

/* INICIO */
cargarSlide(0);


</script>
<img src="SEMAR.png" class="img-esquina">
</body>

</html>
